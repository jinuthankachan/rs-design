# CP7 — CI: fmt · clippy · workspace tests (incl. golden) · seam e2e.
#
# Fast gate that runs on every push to main and every PR. The heavier package
# job (build the .deb/.AppImage + install-test in WebKitGTK) lives in
# package.yml so PRs stay quick; release.yml reuses package.yml on tags.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt · clippy · test (workspace + golden)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Tauri v2 / WebKitGTK system libs — needed because `cargo test --workspace`
      # and clippy compile `src-tauri` (gtk/webkit/wry/tauri).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libssl-dev build-essential curl wget file

      - name: Install Rust (stable + rustfmt + clippy)
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt clippy
          rustup default stable

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # The golden suite (od-contract/tests/golden.rs) runs as part of the
      # workspace tests: it drives the real od-server catalog handlers over the
      # vendored submodule content and asserts byte-identical parity with the
      # pinned-daemon fixtures. This is the gate the V2 CONTRACT requires.
      - name: test (workspace + golden suite)
        run: cargo test --workspace

  e2e:
    name: e2e seam (catalog + SSE + mock BYOK)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev \
            libgtk-3-dev libssl-dev patchelf build-essential curl

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # pnpm version is pinned by the submodule's package.json (packageManager:
      # pnpm@10.33.2); corepack honors it when run from vendor/open-design.
      - name: Enable corepack
        run: corepack enable

      - name: Install Rust (stable)
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - uses: Swatinem/rust-cache@v2

      - name: Build the Node daemon (tsc)
        working-directory: vendor/open-design
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @open-design/daemon build

      # Seam-level e2e: catalog 200 + a BYOK SSE round-trip against a loopback
      # mock OpenAI provider, exercised through the real axum router the webview
      # talks to. The in-WebKitGTK launch e2e runs in package.yml.
      - name: e2e smoke (seam)
        run: bash scripts/e2e-smoke.sh
